services:
  # Next.js web application
  - type: web
    name: arcadium-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: WHATSAPP_API_TOKEN
        sync: false
      - key: WHATSAPP_INSTANCE_ID
        sync: false
      - key: WHATSAPP_API_PROVIDER
        value: "ultramsg" # Default provider, can be overridden by user during deploy

  # Discord Bot Background Worker
  - type: worker
    name: arcadium-discord-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: npx tsx scripts/discord-bot.ts
    plan: starter
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_GUILD_ID
        sync: false
