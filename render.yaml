services:
  # Next.js web application
  - type: web
    name: arcadium-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: WHATSAPP_API_TOKEN
        sync: false
      - key: WHATSAPP_INSTANCE_ID
        sync: false
      - key: WHATSAPP_API_PROVIDER
        value: "ultramsg" # Default provider
